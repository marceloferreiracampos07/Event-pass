services:
  identity-banco:
    image: mysql:8.0
    container_name: identity-banco
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Jr2007
      MYSQL_DATABASE: identity_db
    ports:
      - 3308:3306
    volumes:
      - identity-db-data:/var/lib/mysql
  catalog-banco:
    image: mysql:8.0
    container_name: catalog-banco
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Jr2007
      MYSQL_DATABASE: catalog_db
    ports:
      - 3307:3306
    volumes:
      - catalog-db-data:/var/lib/mysql
volumes:
  identity-db-data:
  catalog-db-data:
